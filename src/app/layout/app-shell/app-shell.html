<mat-sidenav-container class="h-dvh bg-surface-muted" autosize>
  <!-- Mobile navigation drawer -->
  <mat-sidenav
    #menu
    position="start"
    mode="over"
    [opened]="menuOpen()"
    (openedChange)="onMenuOpenedChange($event)"
    class="spire-menu-drawer w-[70px] max-w-[70px]"
  >
    <app-side-rail class="block h-full w-full max-w-[70px]" />
  </mat-sidenav>

  <!-- AI chat drawer -->
  <mat-sidenav
    #chatDrawer
    position="end"
    [mode]="chatMode()"
    [opened]="chat.isOpen()"
    (openedChange)="onChatOpenedChange($event)"
    class="spire-chat-drawer w-full sm:w-[420px]"
  >
    @if (chat.isOpen()) {
      <app-chat-panel class="block h-full" />
    }
  </mat-sidenav>

  <mat-sidenav-content class="flex h-dvh overflow-hidden bg-surface-muted">
    <div class="flex h-dvh min-h-0 min-w-0 flex-1 flex-col p-3 lg:p-0">
      <div
        class="flex h-full min-h-0 flex-1 flex-col overflow-hidden rounded-3xl bg-white shadow-sm ring-1 ring-black/5 lg:h-dvh lg:rounded-none lg:bg-transparent lg:shadow-none lg:ring-0"
      >
        <div class="flex h-full min-h-0 flex-1 overflow-hidden lg:h-dvh">
          <div class="flex min-h-0 min-w-0 flex-1 flex-col overflow-hidden">
            <app-top-nav (menuToggle)="menu.toggle()" />

            <div class="flex min-h-0 flex-1 overflow-hidden">
              <app-side-rail class="hidden h-full w-[70px] max-w-[70px] shrink-0 lg:block" />

              <main class="no-scrollbar min-w-0 flex-1 overflow-y-auto">
                <router-outlet />
              </main>
            </div>
          </div>

          <app-attendance-rail class="hidden h-dvh shrink-0 lg:block" />
        </div>
      </div>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
