<!-- Mobile top bar -->
<div class="flex items-center justify-between gap-3 px-4 py-3 lg:hidden">
  <div class="flex items-center gap-2">
  <button
    type="button"
    class="flex h-11 w-11 items-center justify-center rounded-xl bg-surface text-ink shadow-sm ring-1 ring-black/5"
    (click)="menuToggle.emit()"
    aria-label="Open menu"
  >
    <app-fa-icon [icon]="icons.menu" class="text-base" />
  </button>

  <img
    src="images/app-icon.png"
    alt=""
    aria-hidden="true"
    class="h-8 w-8 rounded-lg object-cover"
  />
  <span class="text-xl font-bold tracking-tight text-primary">Spire</span>
</div>
  <div class="flex items-center gap-2">
    <button
      type="button"
      class="flex h-11 w-11 items-center justify-center rounded-xl bg-surface text-ink shadow-sm ring-1 ring-black/5"
      aria-label="Search"
    >
      <img
        src="images/search-icon.png"
        alt=""
        aria-hidden="true"
        class="h-4 w-4 object-contain"
      />
    </button>
    <button
      type="button"
      class="flex h-11 w-11 items-center justify-center rounded-xl bg-surface text-ink shadow-sm ring-1 ring-black/5"
      aria-label="Notifications"
    >
      <img
        src="images/notifi.png"
        alt=""
        aria-hidden="true"
        class="h-4 w-4 object-contain"
      />
    </button>
    <button
      type="button"
      class="h-11 w-11 overflow-hidden rounded-full shadow-sm ring-1 ring-black/5 flex items-center justify-center"
      aria-label="Open spire AI"
      (click)="openChat()"
    >
      <img
        src="images/ai-icon.png"
        alt=""
        aria-hidden="true"
        class="h-full w-full object-cover"
      />
    </button>
  </div>
</div>

<!-- Desktop top bar -->
<div class="hidden items-center gap-6 px-6 py-4 lg:flex">
  <div class="flex items-center gap-2.5">
    <img
      src="images/app-icon.png"
      alt=""
      aria-hidden="true"
      class="h-8 w-8 rounded-lg object-cover"
    />
    <span class="text-xl font-bold tracking-tight text-primary">Spire</span>
  </div>

  <div
    class="mx-auto flex w-full max-w-md items-center gap-2 rounded-full bg-surface px-4 py-2 text-ink-muted ring-1 ring-black/5"
  >
    <app-fa-icon [icon]="icons.search" class="text-sm" />
    <input
      type="search"
      placeholder="Search..."
      class="w-full bg-transparent text-sm text-ink outline-none placeholder:text-ink-muted"
      aria-label="Search"
    />
  </div>

  <div class="flex items-center gap-2">
    <button
      type="button"
      class="flex h-10 w-10 items-center justify-center rounded-full bg-surface text-ink ring-1 ring-black/5 transition hover:text-secondary"
      aria-label="Notifications"
    >
      <app-fa-icon [icon]="icons.bell" class="text-base" />
    </button>
    <button
      type="button"
      class="flex h-10 w-10 items-center justify-center rounded-full bg-surface text-ink ring-1 ring-black/5 transition hover:text-secondary"
      aria-label="Apps"
    >
      <app-fa-icon [icon]="icons.apps" />
    </button>
    <button
      type="button"
      class="flex h-10 w-10 items-center justify-center rounded-full bg-surface text-ink ring-1 ring-black/5 transition hover:text-secondary"
      aria-label="Support"
    >
      <app-fa-icon [icon]="icons.headset" />
    </button>
  </div>
</div>
