<!-- Mobile top bar -->
<div class="flex items-center justify-between gap-3 px-4 py-3 lg:hidden">
  <div class="flex items-center gap-2">
  <button
    type="button"
    class="flex h-11 w-11 items-center justify-center rounded-xl bg-surface text-ink shadow-sm ring-1 ring-black/5"
    (click)="menuToggle.emit()"
    aria-label="Open menu"
  >
    <app-fa-icon [icon]="icons.menu" class="text-base" />
  </button>

  <img
    src="images/app-icon.png"
    alt=""
    aria-hidden="true"
    class="h-8 w-8 rounded-lg object-cover"
  />
  <span class="text-xl font-bold tracking-tight text-primary">Spire</span>
</div>
  <div class="flex items-center gap-2">
    <button
      type="button"
      class="flex h-11 w-11 items-center justify-center rounded-xl bg-surface text-ink shadow-sm ring-1 ring-black/5"
      aria-label="Search"
    >
      <img
        src="images/search-icon.png"
        alt=""
        aria-hidden="true"
        class="h-4 w-4 object-contain"
      />
    </button>
    <button
      type="button"
      class="flex h-11 w-11 items-center justify-center rounded-xl bg-surface text-ink shadow-sm ring-1 ring-black/5"
      aria-label="Notifications"
    >
      <img
        src="images/notifi.png"
        alt=""
        aria-hidden="true"
        class="h-4 w-4 object-contain"
      />
    </button>
    <button
      type="button"
      class="h-11 w-11 overflow-hidden rounded-full shadow-sm ring-1 ring-black/5 flex items-center justify-center"
      aria-label="Open spire AI"
      (click)="openChat()"
    >
      <img
        src="images/ai-icon.png"
        alt=""
        aria-hidden="true"
        class="h-full w-full object-cover"
      />
    </button>
  </div>
</div>

<!-- Desktop top bar -->
<div class="hidden items-center gap-6 px-6 py-4 justify-between lg:flex">
  <div class="flex items-center gap-2.5">
    <img
      src="images/app-icon.png"
      alt=""
      aria-hidden="true"
      class="h-8 w-8 rounded-lg object-cover"
    />
    <span class="text-xl font-bold tracking-tight text-primary">Spire</span>
  </div>
<div class="flex items-center gap-2">
  <div
    class="flex w-[270px] h-[50px] items-center gap-2 rounded-[12px] bg-surface px-4 py-2 text-ink-muted ring-1 ring-black/5 transition-[width] duration-200 hover:w-[310px]"
  >
    <img src="images/search-icon.png" alt="" aria-hidden="true" class="h-4 w-4 object-contain" />
    <input
      type="search"
      placeholder="Search..."
      class="w-full bg-transparent text-sm text-ink outline-none placeholder:text-ink-muted"
      aria-label="Search"
    />
  </div>

  <div class="flex items-center gap-2">
    <button
      type="button"
      class="flex w-[50px] h-[50px] items-center justify-center rounded-lg bg-surface text-ink ring-1 ring-black/5 transition hover:text-secondary"
      aria-label="Notifications"
    >
        <img
        src="images/notifi.png"
        alt=""
        aria-hidden="true"
        class="h-4 w-4 object-contain"
      />
    </button>
    <button
      type="button"
      class="flex w-[50px] h-[50px] items-center justify-center rounded-lg bg-surface text-ink ring-1 ring-black/5 transition hover:text-secondary"
      aria-label="Apps"
    >
      <img src="images/apps.png" alt="" aria-hidden="true" class="h-4 w-4 object-contain" />
    </button>
    <button
      type="button"
      class="flex w-[50px] h-[50px] items-center justify-center rounded-lg bg-surface text-ink ring-1 ring-black/5 transition hover:text-secondary"
      aria-label="Support"
    >
      <img src="images/headset.png" alt="" aria-hidden="true" class="h-4 w-4 object-contain" />
    </button>
  </div>
</div>
</div>
