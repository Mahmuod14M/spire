<div class="flex">
  <div class="min-w-0 flex-1 bg-white rounded-3xl p-2">
    <app-hero-banner />
    <app-services-slider />
  </div>

  <!-- Desktop attendance rail -->
  <aside class="hidden w-[7.5rem] bg-white mx-4 rounded-3xl p-2 shrink-0 flex-col items-center gap-3 pt-1 lg:flex">
    <div
      class="flex w-full flex-col items-center rounded-2xl  px-2 py-3 text-center "
    >
      <img
        src="images/time.png"
        alt=""
        aria-hidden="true"
        class="mb-1 h-9 w-9 object-contain"
      />
      <span class="mt-1 text-xs  text-ink-muted">Attendance</span>
    </div>

    <div
      class="flex w-full flex-col items-center rounded-2xl  px-2 py-3 text-center"
    >
      <img
        src="images/gate.png"
        alt=""
        aria-hidden="true"
        class="mb-1 h-9 w-9 object-contain"
      />
      <span class="text-xs font-medium leading-tight text-gate">Out of gate</span>
    </div>
    <hr class="w-full border-t border-gray-200 my-8">
    <button
      type="button"
      class="flex items-center justify-center rounded-full transition hover:scale-[1.03]"
      aria-label="Open spire AI"
      (click)="openChat()"
    >
      <img src="images/add-btn.png" alt="" aria-hidden="true" class=" object-contain" />
    </button>
    <hr class="w-full border-t border-gray-200 my-8">
    <button
      type="button"
      class="mt-auto flex  items-center justify-center transition hover:scale-[1.03]"
      (click)="openChat()"
      aria-label="Open spire AI"
    >
      <img src="images/stars.png" alt="" aria-hidden="true" class=" object-contain" />
    </button>
  </aside>
</div>
