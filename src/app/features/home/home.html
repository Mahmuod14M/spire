<div class="flex gap-5 p-5 lg:gap-6 lg:p-6">
  <div class="min-w-0 flex-1">
    <app-hero-banner />
    <app-services-slider />
  </div>

  <!-- Desktop attendance rail -->
  <aside class="hidden w-[4.5rem] shrink-0 flex-col items-center gap-3 pt-1 lg:flex">
    <div
      class="flex w-full flex-col items-center rounded-2xl bg-teal-soft px-2 py-3 text-center text-teal"
    >
      <img
        src="images/time.png"
        alt=""
        aria-hidden="true"
        class="mb-1 h-9 w-9 object-contain"
      />
      <span class="block text-base font-bold leading-none">4H</span>
      <span class="mt-1 text-[10px] font-medium leading-tight">Attendance</span>
    </div>

    <div
      class="flex w-full flex-col items-center rounded-2xl bg-secondary-light px-2 py-3 text-center"
    >
      <img
        src="images/gate.png"
        alt=""
        aria-hidden="true"
        class="mb-1 h-9 w-9 object-contain"
      />
      <span class="text-[10px] font-medium leading-tight text-secondary">Out of gate</span>
    </div>

    <button
      type="button"
      class="flex h-11 w-11 items-center justify-center rounded-full bg-secondary-light text-secondary transition hover:bg-secondary/15"
      aria-label="Add"
    >
      <app-fa-icon [icon]="icons.plus" />
    </button>

    <button
      type="button"
      class="mt-auto flex h-12 w-12 items-center justify-center text-primary/40 transition hover:text-primary/70"
      (click)="openChat()"
      aria-label="Open spire AI"
    >
      <app-fa-icon [icon]="icons.sparkles" class="text-2xl" />
    </button>
  </aside>
</div>
