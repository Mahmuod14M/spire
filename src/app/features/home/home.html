<div class="flex gap-6 p-6 bg-white rounded-3xl ">
  <div class="min-w-0 flex-1">
    <app-hero-banner />
    <app-services-slider />
  </div>

  <!-- Desktop attendance rail -->
  <aside class="hidden w-24 shrink-0 flex-col items-center gap-4 pt-1 lg:flex">
    <div class="flex w-full flex-col items-center rounded-2xl bg-accent/90 p-3 text-center text-white shadow-sm">
      <app-fa-icon [icon]="icons.battery" class="mb-1 text-2xl" />
      <span class="block text-lg font-bold">4H</span>
      <span class="text-[11px] opacity-90">Attendance</span>
    </div>
    <div class="flex w-full flex-col items-center rounded-2xl bg-secondary/10 p-3 text-center">
      <app-fa-icon [icon]="icons.chart" class="mb-1 text-secondary" />
      <span class="block text-[11px] font-medium text-secondary">hours logged</span>
    </div>
    <button
      type="button"
      class="flex h-11 w-11 items-center justify-center rounded-full bg-secondary/10 text-secondary transition hover:bg-secondary/20"
      aria-label="Add"
    >
      <app-fa-icon [icon]="icons.plus" />
    </button>
  </aside>
</div>

<!-- Floating AI button (desktop) -->
<button
  type="button"
  class="fixed bottom-6 right-6 z-30 hidden h-14 w-14 items-center justify-center rounded-full bg-white text-secondary shadow-xl ring-1 ring-black/5 transition hover:scale-105 lg:flex"
  (click)="openChat()"
  aria-label="Open spire AI"
>
  <app-fa-icon [icon]="icons.sparkles" class="text-xl" />
</button>
