<section class="mt-6 lg:mt-8">
  <div class="flex items-center justify-between px-1">
    <h2 class="flex items-center gap-2 text-base font-bold text-ink lg:text-lg">
      <span class="h-4 w-1 rounded-full bg-secondary"></span>
      <span class="lg:hidden">Services Categories</span>
      <span class="hidden lg:inline">E-Services Categories</span>
    </h2>
    <button type="button" class="text-sm font-semibold text-secondary transition hover:underline">
      See All
    </button>
  </div>

  <ul class="no-scrollbar mt-4 flex snap-x snap-mandatory gap-3 overflow-x-auto pb-2 lg:gap-4">
    @for (category of categories; track category.id) {
      <li class="w-56 shrink-0 snap-start lg:min-w-52 lg:w-auto lg:flex-1">
        <button
          type="button"
          class="flex w-full items-center gap-3 rounded-2xl bg-surface px-4 py-4 text-left shadow-sm ring-1 ring-black/5 transition hover:-translate-y-0.5 hover:shadow-md"
        >
          <span
            class="flex h-11 w-11 shrink-0 items-center justify-center rounded-xl"
            [style.backgroundColor]="category.accent + '1f'"
            [style.color]="category.accent"
          >
            <app-fa-icon [icon]="category.icon" />
          </span>
          <span class="text-sm font-semibold text-ink">{{ category.name }}</span>
        </button>
      </li>
    }
  </ul>
</section>
