<section
  class="relative overflow-hidden rounded-3xl bg-primary text-white shadow-xl h-[62dvh] min-h-[26rem] max-h-[34rem] lg:h-auto lg:min-h-0 lg:max-h-none"
  style="background-image: var(--gradient-banner)"
>
  <!-- Background imagery -->
  <img
    src="images/hero-mobile.png"
    alt=""
    aria-hidden="true"
    class="pointer-events-none absolute inset-x-0 bottom-0 mx-auto h-full w-full object-cover object-bottom opacity-95 lg:hidden"
  />
  <img
    src="images/hero-desktop.png"
    alt=""
    aria-hidden="true"
    class="pointer-events-none absolute inset-0 hidden h-full w-full object-cover object-right lg:block"
  />

  <!-- Mobile / base content (centered) -->
  <div class="relative flex h-full flex-col items-center px-5 pb-5 pt-7 text-center lg:hidden">
    <img
      src="images/pink-stare.png"
      alt=""
      aria-hidden="true"
      class="m-8 object-contain"
    />
    <h1 class="text-3xl font-medium leading-snug mb-7">
      Built to power a nation.<br />
      Ready to power you.
    </h1>
    <p class="mt-4  text-2xl leading-relaxed text-white/85">
      Specialized <br> excellence brings mission-critical
      intelligence to your workday.
    </p>

    <div class="flex-1" aria-hidden="true"></div>

    <button
      type="button"
      class="mt-auto flex w-full max-w-[20rem] items-center gap-2 rounded-full bg-white p-1.5 shadow-lg"
      (click)="openChat()"
    >
      <span
        class="rounded-full bg-secondary px-5 py-2.5 text-sm font-semibold text-white"
      >
        ask spire ai
      </span>
      <span class="flex-1"></span>
      <span
        class="flex h-10 w-10 items-center justify-center rounded-full bg-secondary-light text-secondary"
      >
        <img src="images/mic.png" alt="" aria-hidden="true" class="h-5 w-5 object-contain" />
      </span>
    </button>
  </div>

  <!-- Desktop content (left aligned) -->
  <div class="relative hidden max-w-xl flex-col px-12 py-14 lg:flex">
    <h1 class="text-4xl font-bold leading-tight xl:text-5xl">
      Built to power a nation.<br />Ready to power you.
    </h1>
    <p class="mt-5 max-w-sm text-sm leading-relaxed text-white/80">
      Specialized excellence brings mission-critical intelligence to your workday.
    </p>

    <button
      type="button"
      class="mt-8 flex w-full max-w-md items-center gap-2 rounded-full bg-white p-1.5 shadow-lg transition hover:shadow-xl"
      (click)="openChat()"
    >
      <span
        class="flex items-center gap-2 rounded-full bg-secondary px-5 py-2.5 text-sm font-semibold text-white"
      >
        <app-fa-icon [icon]="icons.sparkles" class="text-xs" />
        ask spire ai
      </span>
      <span class="flex-1"></span>
      <span
        class="flex h-9 w-9 items-center justify-center rounded-full bg-secondary/10 text-secondary"
      >
        <img src="images/mic.png" alt="" aria-hidden="true" class="h-4 w-4 object-contain" />
      </span>
    </button>
  </div>

  <!-- Desktop accents -->
 
  <img
    src="images/badge.png"
    alt=""
    aria-hidden="true"
    class="absolute bottom-8 right-10 hidden h-28 w-28 animate-[spin_18s_linear_infinite] lg:block"
  />
</section>
