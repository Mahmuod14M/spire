<section
  class="relative min-h-[26rem] flex items-center justify-evenly  overflow-hidden rounded-3xl bg-primary text-white shadow-xl lg:min-h-[30rem] xl:min-h-[32rem]"
  style="background-image: var(--gradient-banner)"
>
  <!-- Background imagery -->
  <img
    src="images/hero-mobile.png"
    alt=""
    aria-hidden="true"
    class="pointer-events-none absolute inset-x-0 bottom-0 mx-auto h-full w-full object-cover object-bottom opacity-95 lg:hidden"
  />


  <!-- Mobile / base content (centered) -->
  <div class="relative flex h-full min-h-[26rem] flex-col items-center px-5 pb-5 pt-7 text-center lg:hidden">
    <img
      src="images/pink-stare.png"
      alt=""
      aria-hidden="true"
      class="m-8 object-contain"
    />
    <h1 class="mb-7 text-3xl font-medium leading-snug">
      Built to power a nation.<br />
      Ready to power you.
    </h1>
    <p class="mt-4 text-2xl leading-relaxed text-white/85">
      Specialized <br />
      excellence brings mission-critical intelligence to your workday.
    </p>

    <div class="flex-1" aria-hidden="true"></div>

    <button
      type="button"
      class="mt-auto flex w-full max-w-[20rem] items-center gap-2 rounded-full bg-white p-1.5 shadow-lg"
      (click)="openChat()"
    >
      <span
        class="flex items-center gap-2 rounded-full bg-secondary px-5 py-2.5 text-sm font-semibold text-white"
      >
        <img
          src="images/ai-icon.png"
          alt=""
          aria-hidden="true"
          class="h-5 w-5 rounded-full object-cover"
        />
        ask spire ai
      </span>
      <span class="flex-1"></span>
      <span
        class="flex h-10 w-10 items-center justify-center rounded-full bg-secondary-light text-secondary"
      >
        <img src="images/mic.png" alt="" aria-hidden="true" class="h-5 w-5 object-contain" />
      </span>
    </button>
  </div>

  <!-- Desktop content (left aligned) -->
  <div class="relative z-10 hidden  flex-col px-10 py-12 lg:flex xl:px-12 xl:py-14">
    <h1 class="text-4xl font-bold leading-tight xl:text-[2.75rem] xl:leading-[1.15]">
      Built to power a nation.<br />Ready to power you.
    </h1>
    <p class="mt-5 max-w-md text-base leading-relaxed text-white/80">
      Specialized excellence brings mission-critical intelligence to your workday.
    </p>

    <button
      type="button"
      class="mt-8 flex w-full max-w-md items-center gap-2 rounded-full bg-white p-1.5 shadow-lg transition hover:shadow-xl"
      (click)="openChat()"
    >
      <span
        class="flex items-center gap-2 rounded-full bg-secondary px-5 py-2.5 text-sm font-semibold text-white"
      >
        <img
          src="images/ai-icon.png"
          alt=""
          aria-hidden="true"
          class="h-5 w-5 rounded-full object-cover"
        />
        ask spire ai
      </span>
      <span class="flex-1"></span>
      <span
        class="flex h-9 w-9 items-center justify-center rounded-full bg-secondary-light text-secondary"
      >
        <img src="images/mic.png" alt="" aria-hidden="true" class="h-4 w-4 object-contain" />
      </span>
    </button>
  </div>
  <img
    src="images/hero-desktop.png"
    alt=""
    aria-hidden="true"
    class="pointer-events-none  inset-0 hidden h-full w-auto object-cover object-[right_center] lg:block"
  />
  <!-- Desktop accents -->

</section>
