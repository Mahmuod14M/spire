<section
  class="relative overflow-hidden rounded-3xl bg-primary text-white shadow-xl"
  style="background-image: var(--gradient-banner)"
>
  <!-- Background imagery -->
  <img
    src="images/hero-mobile.png"
    alt=""
    aria-hidden="true"
    class="pointer-events-none absolute inset-x-0 bottom-0 mx-auto h-full w-full object-cover object-bottom opacity-90 lg:hidden"
  />
  <img
    src="images/hero-desktop.png"
    alt=""
    aria-hidden="true"
    class="pointer-events-none absolute inset-0 hidden h-full w-full object-cover object-right lg:block"
  />

  <!-- Mobile / base content (centered) -->
  <div class="relative flex flex-col items-center px-6 py-8 text-center lg:hidden">
    <app-fa-icon [icon]="icons.asterisk" class="mb-6 text-5xl text-secondary" />
    <h1 class="text-2xl font-semibold leading-snug">
      Built to power a nation.<br />Ready to power you.
    </h1>
    <p class="mt-5 max-w-xs text-sm leading-relaxed text-white/80">
      <span class="font-semibold text-white">Specialized</span> excellence brings mission-critical
      intelligence to your workday.
    </p>

    <button
      type="button"
      class="mt-7 flex w-full max-w-sm items-center gap-2 rounded-full bg-white p-1.5 shadow-lg"
      (click)="openChat()"
    >
      <span
        class="flex items-center gap-2 rounded-full bg-secondary px-5 py-2.5 text-sm font-semibold text-white"
      >
        <app-fa-icon [icon]="icons.sparkles" class="text-xs" />
        ask spire ai
      </span>
      <span class="flex-1"></span>
      <span
        class="flex h-9 w-9 items-center justify-center rounded-full bg-secondary/10 text-secondary"
      >
        <app-fa-icon [icon]="icons.microphone" />
      </span>
    </button>
  </div>

  <!-- Desktop content (left aligned) -->
  <div class="relative hidden max-w-xl flex-col px-12 py-14 lg:flex">
    <h1 class="text-4xl font-bold leading-tight xl:text-5xl">
      Built to power a nation.<br />Ready to power you.
    </h1>
    <p class="mt-5 max-w-sm text-sm leading-relaxed text-white/80">
      Specialized excellence brings mission-critical intelligence to your workday.
    </p>

    <button
      type="button"
      class="mt-8 flex w-full max-w-md items-center gap-2 rounded-full bg-white p-1.5 shadow-lg transition hover:shadow-xl"
      (click)="openChat()"
    >
      <span
        class="flex items-center gap-2 rounded-full bg-secondary px-5 py-2.5 text-sm font-semibold text-white"
      >
        <app-fa-icon [icon]="icons.sparkles" class="text-xs" />
        ask spire ai
      </span>
      <span class="flex-1"></span>
      <span
        class="flex h-9 w-9 items-center justify-center rounded-full bg-secondary/10 text-secondary"
      >
        <app-fa-icon [icon]="icons.microphone" />
      </span>
    </button>
  </div>

  <!-- Desktop accents -->
  <app-fa-icon
    [icon]="icons.asterisk"
    class="absolute right-[34%] top-10 hidden text-4xl text-secondary lg:inline-flex"
    aria-hidden="true"
  />
  <img
    src="images/badge.png"
    alt=""
    aria-hidden="true"
    class="absolute bottom-8 right-10 hidden h-28 w-28 animate-[spin_18s_linear_infinite] lg:block"
  />
</section>
